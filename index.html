
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENHENG · 产品笔记</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b10;
    --surface: #10111a;
    --text: #e2e4ea;
    --accent: #7c6dff;
    --accent2: #2dd4a8;
    --muted: #9395a8;
    --border: #1e1f2e;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Sans', 'Noto Serif SC', serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 720px; margin: 0 auto; padding: 0 24px; }

  header {
    padding: 80px 0 60px;
    border-bottom: 1px solid var(--border);
    animation: fadeUp 1s ease;
  }
  .avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    color: var(--bg);
    font-family: 'Noto Serif SC', serif;
    font-weight: 700;
    font-size: 20px;
    margin-bottom: 24px;
    box-shadow: 0 0 24px rgba(124,109,255,0.3);
  }
  h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 32px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }
  .tagline {
    color: var(--muted);
    font-size: 15px;
    font-weight: 300;
  }

  nav {
    padding: 20px 0;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: rgba(10,11,16,0.85);
    backdrop-filter: blur(12px);
    z-index: 10;
    animation: fadeIn 1.2s ease;
  }
  nav a {
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-right: 28px;
    transition: color 0.2s;
  }
  nav a:hover { color: var(--accent); }

  main { padding: 60px 0 100px; }

  .section-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 32px;
  }

  /* Cards */
  .card {
    padding: 32px 0;
    border-bottom: 1px solid var(--border);
    transition: all 0.3s ease;
    cursor: pointer;
  }
  .card:first-child { border-top: 1px solid var(--border); }
  .card:hover { padding-left: 12px; }
  .card-date {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .card-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 8px;
    transition: color 0.2s;
  }
  .card:hover .card-title { color: var(--accent); }
  .card-desc {
    font-size: 14px;
    color: var(--muted);
    font-weight: 300;
  }

  /* Nav cards for index */
  .nav-cards { display: flex; flex-direction: column; gap: 16px; margin-bottom: 60px; }
  .nav-card {
    display: flex; align-items: center; gap: 16px;
    padding: 20px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.3s ease;
  }
  .nav-card:hover {
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(124,109,255,0.15);
    transform: translateY(-2px);
  }
  .nav-card-icon {
    font-size: 24px;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    border-radius: 8px;
  }
  .nav-card-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .nav-card-desc {
    font-size: 13px;
    color: var(--muted);
    font-weight: 300;
  }

  /* Quote */
  .quote {
    padding: 48px 0;
    font-family: 'Noto Serif SC', serif;
    font-size: 20px;
    font-style: italic;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.8;
    text-align: center;
  }

  footer {
    padding: 40px 0;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }
  footer a { color: var(--accent); text-decoration: none; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @media (max-width: 600px) {
    header { padding: 48px 0 36px; }
    h1 { font-size: 26px; }
    .card-title { font-size: 18px; }
    .nav-card { padding: 16px; }
  }
</style>
</head>

      </a>
